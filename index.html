<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SGPD - Login</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #7aa2d8, #b9c9dd);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #f9fafb;
  padding: 50px;
  border-radius: 16px;
  text-align: center;
  width: 400px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.1);
}

.logo-box {
  width: 50px;
  height: 50px;
  background: linear-gradient(135deg, #2563EB, #3B82F6);
  margin: 0 auto 10px;
  border-radius: 8px;
}

h1 {
  margin: 10px 0 5px;
  color: #1F2937;
}

.subtitle {
  font-size: 14px;
  color: #6B7280;
  margin-bottom: 30px;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.05);
}

h2 {
  margin-bottom: 20px;
  color: #1F2937;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 6px;
  border: 1px solid #E5E7EB;
  font-size: 14px;
}

input:focus {
  outline: none;
  border-color: #2563EB;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border-radius: 6px;
  border: none;
  background: linear-gradient(135deg, #2563EB, #3B82F6);
  color: white;
  font-size: 15px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  opacity: 0.9;
}

.link {
  margin-top: 15px;
  font-size: 13px;
  color: #6B7280;
}
</style>

</head>

<body>

<div class="container">

<div class="logo-box"></div>

<h1>SGPD</h1>
<div class="subtitle">Sistema de Gestão de Processos Digitais</div>

<div class="card">
<h2>Entrar</h2>

<input type="text" placeholder="E-mail ou Usuário">
<input type="password" placeholder="Senha">

<button>Entrar</button>

<div class="link">Esqueceu sua senha?</div>

</div>

</div>

</body>
</html>
